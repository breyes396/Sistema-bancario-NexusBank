version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: nexusbank-postgres
    restart: always
    environment:
      POSTGRES_DB: NexusBank
      POSTGRES_USER: root
      POSTGRES_PASSWORD: admin
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: