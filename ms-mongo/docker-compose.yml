services:
  mongo:
    image: mongo:7
    restart: always
    ports:
      - '27019:27017'
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - mongo
    environment:
      PORT: 3002
      MONGO_SERVICE_PORT: 3002
      URI_MONGO: mongodb://mongo:27017/NexusBank
      JWT_SECRET: super-secret-jwt
      JWT_EXPIRES_IN: 8h
      FRONTEND_URL: http://localhost:5173
    ports:
      - '3002:3002'

volumes:
  mongo_data:
