services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: NexusBank
      POSTGRES_USER: root
      POSTGRES_PASSWORD: admin
    ports:
      - '5436:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    restart: always
    ports:
      - '27018:27017'
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - postgres
      - mongo
    environment:
      PORT: 3001
      POSTGRES_SERVICE_PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: NexusBank
      DB_USERNAME: root
      DB_PASSWORD: admin
      DB_FORCE_SYNC: 'false'
      DB_SQL_LOGGING: 'false'
      URI_MONGO: mongodb://mongo:27017/NexusBank
      JWT_SECRET: super-secret-jwt
      JWT_EXPIRES_IN: 8h
      FRONTEND_URL: http://localhost:5173
    ports:
      - '3001:3001'

volumes:
  postgres_data:
  mongo_data:
